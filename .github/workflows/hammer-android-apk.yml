name: Hammer OS Android APK

on:
  pull_request:
    paths:
      - "hammer-commerce-agent-v0.1/**"
      - ".github/workflows/hammer-android-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: hammer-commerce-agent-v0.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hammer-commerce-agent-v0.1/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install dependencies
        run: npm ci
      - name: Verify user flow
        run: npm test
      - name: Install stable APK signing key
        run: |
          mkdir -p "$HOME/.android"
          cp android-signing/hammer-debug.keystore "$HOME/.android/debug.keystore"
          chmod 600 "$HOME/.android/debug.keystore"
      - name: Build Android project
        run: |
          npm run build
          npx cap add android
          sed -i '/android {/a\    signingConfigs {\n        debug {\n            storeFile file("../../android-signing/hammer-debug.keystore")\n            storePassword "android"\n            keyAlias "androiddebugkey"\n            keyPassword "android"\n        }\n    }' android/app/build.gradle
          sed -i 's/versionCode 1/versionCode 10/' android/app/build.gradle
          sed -i 's/versionName "1.0"/versionName "1.9"/' android/app/build.gradle
      - name: Build installable APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug
      - name: Stage APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Hammer-OS-Android-V1.9.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Hammer-OS-Android-V1.9
          path: hammer-commerce-agent-v0.1/Hammer-OS-Android-V1.9.apk
          if-no-files-found: error
          retention-days: 30
